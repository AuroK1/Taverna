<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório da Secretária</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c1e14; /* Cor de madeira escura */
            color: #f3e5ab; /* Cor de pergaminho */
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h2 { color: #d4af37; } /* Dourado */
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #d4af37;
            background: #3e2a1c;
            color: white;
        }
        button {
            background-color: #d4af37;
            color: #2c1e14;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h2>📖 Grimório de Anotações</h2>
    <p>O que deseja registrar na história da guilda?</p>
    
    <input type="text" id="anotacao" placeholder="Digite sua anotação...">
    <button onclick="enviarDados()">Gravar no Banco</button>

    <script>
        // Inicializa o WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Expande a tela para o máximo

        function enviarDados() {
            const texto = document.getElementById('anotacao').value;
            
            if (texto === "") {
                alert("O pergaminho está vazio!");
                return;
            }

            // Esta é a magia: envia dados de volta para o bot em formato JSON
            const dados = {
                anotacao: texto,
                timestamp: new Date().toISOString()
            };

            tg.sendData(JSON.stringify(dados)); 
            // O comando acima fecha o WebApp e envia os dados para o Python
        }
    </script>
</body>
</html>
