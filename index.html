<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VALK - O Grimório</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* === TEMA RPG === */
        :root {
            --madeira-escura: #1a120c;
            --madeira-clara: #3e2a1c;
            --pergaminho: #f4e8c1;
            --ouro-velho: #cba135;
            --vermelho-sangue: #8a2be2; /* Usado para botões de ação mágica */
        }

        body {
            font-family: 'Palatino Linotype', 'Book Antiqua', Palatino, serif;
            background-color: var(--madeira-escura);
            color: var(--pergaminho);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* === BARRA DE NAVEGAÇÃO (TABS) === */
        .navbar {
            display: flex;
            background-color: var(--madeira-clara);
            border-bottom: 2px solid var(--ouro-velho);
            overflow-x: auto;
            white-space: nowrap;
            padding: 5px;
        }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: var(--pergaminho);
            font-family: inherit;
            font-size: 14px;
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.3s;
        }

        .nav-btn.active {
            border: 1px solid var(--ouro-velho);
            background-color: rgba(203, 161, 53, 0.1);
            font-weight: bold;
        }

        /* === ÁREA DE CONTEÚDO === */
        .content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .tab-panel {
            display: none; /* Escondido por padrão */
            flex-direction: column;
            gap: 15px;
        }

        .tab-panel.active {
            display: flex; /* Mostra a aba ativa */
        }

        /* === ESTILOS GERAIS DE RPG === */
        h2 {
            margin: 0 0 10px 0;
            color: var(--ouro-velho);
            text-align: center;
            border-bottom: 1px dashed var(--ouro-velho);
            padding-bottom: 5px;
        }

        .card {
            background-color: var(--madeira-clara);
            border: 1px solid var(--ouro-velho);
            padding: 15px;
            border-radius: 8px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        input, textarea {
            width: 100%;
            background-color: var(--madeira-escura);
            color: var(--pergaminho);
            border: 1px solid var(--ouro-velho);
            padding: 10px;
            font-family: inherit;
            border-radius: 4px;
            box-sizing: border-box;
            margin-bottom: 10px;
        }

        button.btn-magic {
            background-color: var(--ouro-velho);
            color: var(--madeira-escura);
            border: none;
            padding: 12px;
            font-family: inherit;
            font-weight: bold;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            box-shadow: inset 0 0 5px rgba(0,0,0,0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button.btn-magic:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="navbar">
        <button class="nav-btn active" onclick="abrirAba('aba-caos', this)">🌀 O Caos</button>
        <button class="nav-btn" onclick="abrirAba('aba-tribunal', this)">⚖️ Tribunal</button>
        <button class="nav-btn" onclick="abrirAba('aba-mural', this)">📌 Mural</button>
    </div>

    <div class="content">
        
        <div id="aba-caos" class="tab-panel active">
            <h2>O Poço do Caos</h2>
            <p style="text-align: center; font-size: 14px;">Seus pensamentos soltos aguardam estruturação.</p>
            
            <div class="card">
                <i>"Lembrar de pagar a guilda dos mercadores amanhã..."</i>
            </div>
            <div class="card">
                <i>"Ideia de projeto: forjar uma espada de gelo."</i>
            </div>

            <button class="btn-magic" onclick="invocarOrganizacao()">✨ Invocar VALK (Organizar)</button>
        </div>

        <div id="aba-tribunal" class="tab-panel">
            <h2>O Tribunal das Vozes</h2>
            <div class="card">
                <label>Qual desejo impulsivo devemos julgar?</label>
                <textarea rows="3" placeholder="Ex: Quero comprar um item mágico muito caro..."></textarea>
                <button class="btn-magic" style="width: 100%;">⚖️ Iniciar Julgamento</button>
            </div>
            </div>

        <div id="aba-mural" class="tab-panel">
            <h2>Mural da Taverna</h2>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <div class="card" style="background-color: #5c4033;">
                    <b>Link Útil:</b><br>Tutorial de Python
                </div>
                <div class="card" style="background-color: #5c4033;">
                    <b>Referência:</b><br>Tabela de poções
                </div>
            </div>
        </div>

    </div>

    <script>
        // Inicializa o WebApp do Telegram
        const tg = window.Telegram.WebApp;
        tg.expand(); 

        // Lógica simples para trocar de abas
        function abrirAba(idAba, elementoBotao) {
            // Esconde todas as abas
            document.querySelectorAll('.tab-panel').forEach(aba => {
                aba.classList.remove('active');
            });
            // Tira o destaque de todos os botões
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Mostra a aba clicada e destaca o botão
            document.getElementById(idAba).classList.add('active');
            elementoBotao.classList.add('active');
        }

        // Função para testar a comunicação com o Python
        function invocarOrganizacao() {
            tg.sendData(JSON.stringify({ acao: "organizar_caos" }));
        }
    </script>
</body>
</html>
